name: 🐞 Bug report
description: Report a bug or an issue.
title: 'bug: '
labels: ['Bug report']
body:
  - type: markdown
    attributes:
      value: |
        # Patches template bug report

        Before creating a new bug report, please keep the following in mind:

        - **Do not submit a duplicate bug report**: Search for existing bug reports [here](https://github.com/MorpheApp/morphe-patches-template/issues?q=label%3A%22Bug+report%22).
        - **Review the contribution guidelines**: Make sure your bug report adheres to it. You can find the guidelines [here](https://github.com/MorpheApp/morphe-patches-template/blob/main/CONTRIBUTING.md).
        - **Do not use the issue page for support**: If you need help or have questions, check out other platforms on [morphe.software](https://morphe.software).
  - type: textarea
    attributes:
      label: Bug description
      description: |
        - Describe your bug in detail
        - Add steps to reproduce the bug if possible (Step 1. ... Step 2. ...)
        - Add images and videos if possible
    validations:
      required: true
  - type: input
    attributes:
      label: App name
      placeholder: 'Duolingo, Prime Video, MyFitnessPal, etc'
    validations:
      required: true
  - type: input
    attributes:
      label: App version
      description: 'Please provide the version of the app that is causing the issue.'
      placeholder: '1.23.456'
    validations:
      required: true
  - type: input
    attributes:
      label: Manager or CLI version
      description: 'Please provide the version of the Morphe Manager or Morphe CLI used.'
      placeholder: 'Manager v1.12.0'
    validations:
      required: true
  - type: textarea
    attributes:
      label: Error logs
      description: Exceptions can be captured by running `logcat` via `adb` or in a shell.
      render: shell
  - type: textarea
    attributes:
      label: Solution
      description: If applicable, add a possible solution to the bug.
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your bug report will be closed if you don't follow the checklist below.
      options:
        - label: I have checked all open and closed bug reports and this is not a duplicate.
          required: true
        - label: I have chosen an appropriate title.
          required: true
        - label: All requested information has been provided properly.
          required: true
